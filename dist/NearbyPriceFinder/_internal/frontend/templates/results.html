<!DOCTYPE html>
<html>

<head>

    <title>Search Results</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#020b2d;

            color:white;

            padding:40px;
        }

        h1{

            text-align:center;

            margin-bottom:40px;

            font-size:55px;
        }

        .products{

            display:flex;

            flex-wrap:wrap;

            justify-content:center;

            gap:40px;
        }

        .card{

            width:350px;

            background:white;

            color:black;

            border-radius:25px;

            overflow:hidden;

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-10px);

            box-shadow:0 0 25px rgba(255,255,255,0.3);
        }

        .card img{

            width:100%;

            height:250px;

            object-fit:cover;
        }

        .content{

            padding:20px;

            text-align:center;
        }

        .content h2{

            margin-bottom:15px;

            font-size:35px;
        }

        .content h3{

            margin-bottom:10px;
        }

        .price{

            color:green;

            font-size:30px;

            margin-top:10px;

            margin-bottom:20px;

            font-weight:bold;
        }

        .stock{

            color:#2563eb;

            font-size:22px;

            margin-bottom:20px;
        }

        .buy-btn{

            width:100%;

            padding:15px;

            border:none;

            background:#2563eb;

            color:white;

            font-size:22px;

            border-radius:12px;

            cursor:pointer;

            transition:0.3s;
        }

        .buy-btn:hover{

            background:#1d4ed8;
        }

        .shop-image{

            width:90px !important;

            height:90px !important;

            border-radius:50%;

            margin-top:-50px;

            border:5px solid white;

            object-fit:cover;
        }

        .empty{

            text-align:center;

            font-size:35px;

            margin-top:100px;
        }

    </style>

    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>

<body data-panel="results">

    <h1>

        Nearby Products

    </h1>

    {% if products|length == 0 %}

        <div class="empty">

            No Products Found

        </div>

    {% else %}

    <div class="products">

        {% for product in products %}

        <div class="card">

            <!-- PRODUCT IMAGE -->

            <img src="/static/uploads/{{ product['image'] }}">

            <div class="content">

                <!-- SHOP IMAGE -->

                <img class="shop-image"

                src="/static/uploads/{{ product['shop_image'] }}">

                <h2>

                    {{ product['product_name'] }}

                </h2>

                <h3>

                    🏪 {{ product['shop_name'] }}

                </h3>

                <h3>

                    📍 {{ product['location'] }}

                </h3>

                <div class="price">

                    ₹{{ product['price'] }}

                </div>

                <div class="stock">

                    Stock : {{ product['stock'] }}

                </div>

                <a href="/payment/{{ product['id'] }}">

                    <button class="buy-btn">

                        Buy Now

                    </button>

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

    {% endif %}

</body>

</html>
