<!DOCTYPE html>
<html>

<head>

    <title>Payment</title>

    <style>

        body{
            background:#020b2d;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:40px;
        }

        .card{

            width:450px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            text-align:center;
            padding-bottom:30px;
        }

        .product-image{

            width:100%;
            height:280px;
            object-fit:cover;
        }

        h1{
            margin-top:20px;
            font-size:40px;
        }

        h2{
            margin-top:10px;
        }

        .price{
            color:green;
            font-size:35px;
            font-weight:bold;
            margin:20px 0;
        }

        form{
            width:90%;
            margin:auto;
        }

        input{

            width:100%;
            padding:16px;
            margin-top:15px;
            border-radius:12px;
            border:1px solid gray;
            font-size:18px;
        }

        .btn{

            width:100%;
            padding:16px;
            margin-top:20px;
            border:none;
            border-radius:12px;
            font-size:20px;
            color:white;
            cursor:pointer;
        }

        .online{
            background:#2563eb;
        }

        .cod{
            background:green;
        }

        .qr{

            width:250px;
            margin-top:20px;
        }

    </style>

    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>

<body data-panel="payment">

    <div class="card">

        <img class="product-image"

        src="/static/uploads/{{ product['image'] }}">

        <h1>

            {{ product['product_name'] }}

        </h1>

        <h2>

            🏪 {{ product['shop_name'] }}

        </h2>

        <div class="price">

            ₹{{ product['price'] }}

        </div>

        <img class="qr"

        src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay">

        <form method="POST" action="/online_payment/{{ product['id'] }}">

            <input type="text"

            name="customer_name"

            placeholder="Enter Your Name"

            required>

            <input type="text"

            name="customer_phone"

            placeholder="Enter Phone Number"

            required>

            <input type="text"

            name="customer_address"

            placeholder="Enter Address"

            required>

            <button class="btn online">

                I Have Paid Online

            </button>

        </form>

        <form method="POST" action="/cash_on_delivery/{{ product['id'] }}">

            <input type="hidden"

            name="customer_name"

            value="COD Customer">

            <input type="hidden"

            name="customer_phone"

            value="9999999999">

            <input type="hidden"

            name="customer_address"

            value="Cash On Delivery Address">

            <button class="btn cod">

                Cash On Delivery

            </button>

        </form>

    </div>

</body>

</html>
