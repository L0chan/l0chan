<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review — COMPARE2SAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14; --surface: #1a1a24; --card: #22222f;
      --border: #2e2e42; --accent: #7c6ef5; --gold: #f59e0b;
      --text: #e8e8f0; --muted: #888899; --radius: 16px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 32px 20px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 44px 40px; max-width: 520px; width: 100%;
    }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; }
    h1 span { color: var(--gold); }
    .product-info { color: var(--muted); margin-bottom: 32px; font-size: 0.92rem; }
    .product-info strong { color: var(--text); }

    /* STAR RATING */
    .star-rating { display: flex; gap: 10px; margin-bottom: 28px; flex-direction: row-reverse; justify-content: flex-end; }
    .star-rating input { display: none; }
    .star-rating label {
      font-size: 2.4rem; cursor: pointer; color: var(--border);
      transition: color .15s, transform .15s;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: var(--gold);
    }
    .star-rating label:hover { transform: scale(1.15); }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-group textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); padding: 12px 16px;
      font-family: inherit; font-size: 0.9rem; resize: vertical; min-height: 110px;
      transition: border-color .2s;
    }
    .form-group textarea:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%; padding: 14px; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      border: none; transition: all .2s; text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #d97706);
      color: #0f0f14;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,.35); }
    .back-link { display: block; text-align: center; margin-top: 16px;
      color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <h1>Rate & <span>Review</span> ⭐</h1>
  <p class="product-info">
    Reviewing: <strong>{{ order.product_name }}</strong>
    &nbsp;·&nbsp; Order #{{ order.id }}
  </p>

  <form method="POST" action="/submit_review/{{ order.id }}">
    <!-- Star picker -->
    <div class="form-group">
      <label>Your Rating</label>
      <div class="star-rating">
        {% for i in range(5, 0, -1) %}
          <input type="radio" id="star{{ i }}" name="rating" value="{{ i }}"
            {% if i == 5 %}checked{% endif %}>
          <label for="star{{ i }}" title="{{ i }} star{% if i > 1 %}s{% endif %}">★</label>
        {% endfor %}
      </div>
    </div>

    <div class="form-group">
      <label for="review-text">Your Review (optional)</label>
      <textarea id="review-text" name="review_text"
        placeholder="What did you like or dislike about this product?"></textarea>
    </div>

    <button class="btn btn-primary" type="submit" id="submit-review-btn">
      ⭐ Submit Review
    </button>
  </form>

  <a class="back-link" href="/home">← Back to Home</a>
</div>
</body>
</html>
