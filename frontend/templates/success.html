<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='flow-ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>
<body data-panel="success">
    <div class="motion-layer" aria-hidden="true">
        <span class="tile" style="--left: 12%; --size: 78px; --duration: 18s; --delay: -2s;"></span>
        <span class="tile" style="--left: 52%; --size: 54px; --duration: 15s; --delay: -8s;"></span>
        <span class="tile" style="--left: 84%; --size: 96px; --duration: 22s; --delay: -5s;"></span>
    </div>

    <main class="success-shell">
        <section class="success-card">
            <div class="success-icon"><i class="fa-solid fa-check"></i></div>
            <h1>Order <span>placed</span></h1>
            <p class="lead" style="margin-left:auto; margin-right:auto;">Your order has been confirmed. Track the rider live and share the delivery OTP only when the product reaches you.</p>

            <div class="order-id-box">Order ID: #{{ order_id }}</div>
            <div class="order-id-box">
                Delivery OTP: {{ delivery_otp }}<br>
                Rider: {{ rider_name }}
            </div>

            <div class="success-actions">
                <a class="primary-btn" href="/track/{{ order_id }}"><i class="fa-solid fa-truck-fast"></i> Track Order</a>
                <a class="secondary-btn" href="/home"><i class="fa-solid fa-house"></i> Home</a>
            </div>
        </section>
    </main>
</body>
</html>
