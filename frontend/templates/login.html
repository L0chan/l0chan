<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPARE2SAVE - Login</title>
    <meta name="theme-color" content="#16a34a">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="{{ url_for('static', filename='app-icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='app-icon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='flow-ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>
<body data-panel="auth">
    <div class="motion-layer" aria-hidden="true">
        <span class="tile" style="--left: 7%; --size: 78px; --duration: 18s; --delay: -2s;"></span>
        <span class="tile" style="--left: 28%; --size: 54px; --duration: 15s; --delay: -8s;"></span>
        <span class="tile" style="--left: 54%; --size: 96px; --duration: 22s; --delay: -5s;"></span>
        <span class="tile" style="--left: 82%; --size: 72px; --duration: 20s; --delay: -10s;"></span>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="{{ url_for('static', filename='app-icon.svg') }}" alt="">
                </div>
                <h1>Welcome Back</h1>
                <p>Login to your account</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div style="background: rgba(251, 113, 133, 0.18); color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; text-align: center; font-weight: 600;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="auth-form">
                <div class="input-group">
                    <input name="username" type="text" placeholder=" " required id="loginUser">
                    <label for="loginUser">Username</label>
                    <div class="input-focus"></div>
                </div>
                
                <div class="input-group">
                    <input name="password" type="password" placeholder=" " required id="loginPass">
                    <label for="loginPass">Password</label>
                    <div class="input-focus"></div>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>New user? <a href="/register">Create account</a></p>
                <div style="margin-top: 15px; opacity: 0.6; font-size: 13px;">
                    <a href="/otp_login">Login with OTP</a>
                </div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
