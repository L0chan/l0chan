<!DOCTYPE html>
<html>

<head>

<title>Live Shop Chat</title>

<style>

body{

    background:#0f172a;

    font-family:Arial;

    color:white;

}

.chat-box{

    width:70%;

    margin:auto;

    margin-top:40px;

    background:white;

    color:black;

    padding:20px;

    border-radius:20px;

}

.message{

    background:#e2e8f0;

    padding:12px;

    border-radius:10px;

    margin-top:10px;

}

form{

    display:flex;

    margin-top:20px;

}

input{

    flex:1;

    padding:15px;

    border:none;

    border-radius:10px;

}

button{

    padding:15px;

    margin-left:10px;

    background:#2563eb;

    color:white;

    border:none;

    border-radius:10px;

}

</style>

<link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>

<body data-panel="chat">

<div class="chat-box">

<h1>

Customer ↔ Shopkeeper Chat

</h1>

{% for msg in messages %}

<div class="message">

<b>

{{ msg.sender }}

</b>

:

{{ msg.message }}

</div>

{% endfor %}

<form method="POST">

<input type="text"

name="message"

placeholder="Type message..."

required>

<button type="submit">

Send

</button>

</form>

</div>

</body>

</html>
