<!DOCTYPE html>
<html>
<head>

<title>Edit Product - Inventory Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#020b52;
    font-family:Arial;
    color:white;
}

.box{
    width:70%;
    margin:auto;
    margin-top:50px;
    background:#1f267a;
    padding:40px;
    border-radius:25px;
}

input{
    width:100%;
    height:70px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    padding-left:20px;
    font-size:28px;
}

button{
    width:100%;
    height:80px;
    border:none;
    border-radius:20px;
    background:#2f65e8;
    color:white;
    font-size:35px;
    margin-top:30px;
    cursor:pointer;
}

</style>

<link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>

<body data-panel="edit">

<main class="box">

    <a class="secondary-btn" style="width:auto; margin-top:0; padding:0 18px;" href="/shopkeeper_dashboard">
        Back to Dashboard
    </a>

    <h1>Edit Product</h1>
    <p class="lead">Refine product details, keep pricing current, and make sure stock is accurate before customers order.</p>

    <form action="/update_product/{{ product['id'] }}" method="POST">
        <div class="field">
            <label for="product_name">Product Name</label>
            <input id="product_name" type="text" name="product_name" value="{{ product['product_name'] }}" required>
        </div>

        <div class="field">
            <label for="price">Price</label>
            <input id="price" type="text" name="price" value="{{ product['price'] }}" required>
        </div>

        <div class="field">
            <label for="stock">Stock</label>
            <input id="stock" type="text" name="stock" value="{{ product['stock'] }}" required>
        </div>

        <button type="submit">
            Update Product
        </button>
    </form>

</main>

</body>
</html>
