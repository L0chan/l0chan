<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <meta name="theme-color" content="#16a34a">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="{{ url_for('static', filename='app-icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='app-icon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='flow-ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>
<body data-panel="auth">
    <div class="motion-layer" aria-hidden="true">
        <span class="tile" style="--left: 8%; --size: 76px; --duration: 18s; --delay: -4s;"></span>
        <span class="tile" style="--left: 34%; --size: 94px; --duration: 22s; --delay: -9s;"></span>
        <span class="tile" style="--left: 76%; --size: 64px; --duration: 17s; --delay: -6s;"></span>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="{{ url_for('static', filename='app-icon.svg') }}" alt="">
                </div>
                <h1>Sign Up</h1>
                <p>Create a new account</p>
            </div>

            <form action="/register_user" method="POST" class="auth-form">
                <div class="input-group">
                    <input name="username" type="text" placeholder=" " required id="regUser">
                    <label for="regUser">Username</label>
                    <div class="input-focus"></div>
                </div>
                
                <div class="input-group">
                    <input name="password" type="password" placeholder=" " required id="regPass">
                    <label for="regPass">Password</label>
                    <div class="input-focus"></div>
                </div>

                <div class="input-group role-group">
                    <select name="role">
                        <option value="customer">I am a Customer</option>
                        <option value="seller">I am a Shopkeeper</option>
                    </select>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Register</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/">Login here</a></p>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
