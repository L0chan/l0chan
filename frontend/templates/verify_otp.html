<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='flow-ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>
<body data-panel="otp">
    <div class="motion-layer" aria-hidden="true">
        <span class="tile" style="--left: 10%; --size: 80px; --duration: 18s; --delay: -2s;"></span>
        <span class="tile" style="--left: 52%; --size: 62px; --duration: 15s; --delay: -7s;"></span>
        <span class="tile" style="--left: 84%; --size: 94px; --duration: 22s; --delay: -5s;"></span>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="{{ url_for('static', filename='app-icon.svg') }}" alt="">
                </div>
                <h1>Enter Code</h1>
                <p>Verify your 6-digit OTP</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-box" style="margin-bottom: 20px; color: var(--np-cyan); font-weight: 700;">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form action="/verify_otp" method="POST" class="auth-form">
                <div class="input-group">
                    <input name="otp" type="number" placeholder=" " required id="otpCode">
                    <label for="otpCode">OTP Code</label>
                    <div class="input-focus"></div>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Verify Code</span>
                    <i class="fa-solid fa-check"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/otp_login">Change phone number</a></p>
            </div>
        </div>
    </main>
</body>
</html>
