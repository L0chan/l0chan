<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile OTP Login</title>
    <meta name="theme-color" content="#16a34a">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="{{ url_for('static', filename='app-icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='app-icon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='flow-ui.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pro-redesign.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='site-theme.css') }}">
</head>
<body data-panel="otp">
    <div class="motion-layer" aria-hidden="true">
        <span class="tile" style="--left: 12%; --size: 82px; --duration: 18s; --delay: -3s;"></span>
        <span class="tile" style="--left: 45%; --size: 58px; --duration: 15s; --delay: -8s;"></span>
        <span class="tile" style="--left: 82%; --size: 96px; --duration: 22s; --delay: -5s;"></span>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="{{ url_for('static', filename='app-icon.svg') }}" alt="">
                </div>
                <h1>Phone Login</h1>
                <p>Verify your mobile number</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-box" style="margin-bottom: 20px; color: var(--np-cyan); font-weight: 700;">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form id="otpForm" onsubmit="event.preventDefault(); sendOTP();" class="auth-form">
                <div id="recaptcha-container"></div>
                <div class="input-group">
                    <input name="phone" type="tel" placeholder=" " required id="otpPhone" value="+91">
                    <label for="otpPhone">Mobile Number</label>
                    <div class="input-focus"></div>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Send Code</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/">Back to password login</a></p>
            </div>
        </div>
    </main>
    <script type="module" src="{{ url_for('static', filename='firebase-auth.js') }}"></script>
    <script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
